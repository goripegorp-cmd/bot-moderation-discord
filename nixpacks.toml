[phases.setup]
# python311 via Nix. tesseract (OCR anti-scam image, owner 2026-06-27) installé via APT =
# déterministe sur l'image Debian de nixpacks (≠ deviner l'attribut Nix). `tesseract-ocr` inclut
# la langue « eng » (ces arnaques sont en anglais). Si absent, l'OCR se désactive seul (fail-safe).
nixPkgs = ["python311"]
aptPkgs = ["tesseract-ocr"]

[phases.install]
cmds = ["pip install -r requirements.txt --no-cache-dir"]

[phases.build]
cmds = []

[start]
cmd = "python3 bot.py"

[caches]
pip = "/root/.cache/pip"
