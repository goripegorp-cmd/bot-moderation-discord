name: Python Compile Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile all .py files (syntax check)
        run: |
          set -e
          echo "Compiling all Python files..."
          ERRORS=0
          for f in $(find . -name '*.py' -not -path './.git/*' -not -path './venv/*'); do
            python -m py_compile "$f" 2>&1 || ERRORS=$((ERRORS+1))
          done
          if [ $ERRORS -ne 0 ]; then
            echo "❌ $ERRORS file(s) failed to compile"
            exit 1
          fi
          echo "✅ All Python files compile cleanly"

      - name: Install dependencies (full prod set)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import check (executes module-level code — catches CommandLimitReached / NameError that syntax-check misses)
        env:
          BOT_TOKEN: dummy-token-for-import-check-only
          MPLBACKEND: Agg
        run: |
          python -c "
          import sys, traceback
          # py_compile only checks SYNTAX. Importing bot.py executes its module-level
          # code: every app_commands registration, the bot construction, and every
          # 'import X' it performs. That reproduces a real boot's import phase — so this
          # step catches CommandLimitReached (>25 subcmds / >100 top-level cmds),
          # NameError, and ImportError that the syntax check cannot see. bot.run() is
          # guarded by 'if __name__ == \"__main__\"', so the bot never connects here.
          try:
              import bot
          except Exception as e:
              print('::error::import bot FAILED at module load — THIS WOULD CRASH THE BOOT')
              print(f'   {type(e).__name__}: {e}')
              traceback.print_exc()
              sys.exit(1)
          print('OK: import bot — commands register and all boot-path modules load cleanly')
          "

      - name: Lint imports (best-effort)
        run: |
          pip install pyflakes
          # Don't fail the build on lint - just report
          pyflakes bot.py unified_logger.py social_gallery.py tracking_layer.py | head -50 || true
