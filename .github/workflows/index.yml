name: Symbol Index

# Regenerates INDEX.md (grep-able symbol map for navigation) once a DAY and on demand,
# then commits the refreshed index back to main.
#
# WHY DAILY, NOT PER-PUSH: a single edit near the top of bot.py shifts thousands of
# downstream line numbers, so a per-push regen produced ~12k-line INDEX.md diffs on
# EVERY commit (noisy history) and forced a pull-before-push dance. Line numbers in
# INDEX.md are only hints (use Grep for the live location), so once-a-day freshness is
# plenty. Need it fresher right now? Run the workflow manually (workflow_dispatch).
#
# LOOP SAFETY: the regen commit carries `[skip ci]` (honoured by GitHub Actions) and
# there is NO `push` trigger here, so the auto-commit can never re-trigger the workflow.
# The commit is also skipped when INDEX.md is byte-identical (diff-guard); the generator
# is deterministic (no timestamps).

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: symbol-index
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate INDEX.md
        run: python generate_index.py

      - name: Ruff lint (non-blocking — report only)
        run: |
          python -m pip install --upgrade pip >/dev/null
          pip install ruff >/dev/null
          echo "::group::ruff check (informational, never fails the build)"
          ruff check . --output-format=concise > ruff-report.txt 2>&1 || true
          echo "Top issues:"
          head -80 ruff-report.txt || true
          echo "Total issues: $(wc -l < ruff-report.txt)"
          echo "::endgroup::"

      - name: Commit INDEX.md if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage first, then compare the index against HEAD. `git diff --quiet -- PATH`
          # alone does NOT detect a brand-new *untracked* INDEX.md (git diff only sees
          # tracked paths), so the first generation would be silently skipped. Staging
          # then `git diff --cached --quiet` correctly detects both new and changed files.
          git add INDEX.md
          if git diff --cached --quiet -- INDEX.md; then
            echo "INDEX.md unchanged — nothing to commit."
          else
            git commit -m "chore: regenerate INDEX.md [skip ci]"
            # Best-effort push: if main has branch protection that rejects the
            # bot push, degrade gracefully (job stays green; INDEX.md just won't
            # auto-update) rather than showing a spurious red X every push.
            if git push; then
              echo "INDEX.md updated and pushed."
            else
              echo "::warning::Could not push INDEX.md (branch protection?). Regenerate locally with: python generate_index.py"
            fi
          fi
