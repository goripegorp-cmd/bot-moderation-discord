name: Pytest Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # On installe juste pytest + les deps réelles du bot.
          # discord.py / aiosqlite / aiohttp sont nécessaires pour les imports.
          pip install pytest pytest-asyncio
          pip install "discord.py>=2.7,<3" aiosqlite aiohttp python-dotenv

      - name: Run pytest smoke tests
        run: |
          pytest tests/ -v --tb=short
